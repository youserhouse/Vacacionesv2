<html lang="es">
<head>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="styles.css">
<style>
  html, body { height:100%; margin:0; overflow:hidden; }
  body { background:#0f0f13; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .splash-wrap { position:relative; text-align:center; z-index:2; }
  .ring {
    position:absolute; border-radius:50%; top:50%; left:50%;
    border:1px solid rgba(245,166,35,.12);
  }
</style>
</head>
<body>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyA1iZHd2X0xfNNxtdg8VFPGj0gNJjO7iCI",
    authDomain: "control-vacaciones-50415.firebaseapp.com",
    projectId: "control-vacaciones-50415",
    storageBucket: "control-vacaciones-50415.appspot.com",
    messagingSenderId: "158631364453",
    appId: "1:158631364453:web:4ed0af369aaaec0cbe838c"
  });
  firebase.auth().onAuthStateChanged(user => {
    if (!user) location.replace('login.html');
  });
</script>

<div class="ring" style="width:420px;height:420px;margin:-210px 0 0 -210px;animation:ring 3s linear infinite;"></div>
<div class="ring" style="width:270px;height:270px;margin:-135px 0 0 -135px;animation:ring 2s linear infinite reverse;"></div>

<div class="splash-wrap">
  <div style="font-size:5rem;animation:floatLogo 3s ease-in-out infinite;display:block;line-height:1.2;">🗓</div>
  <div style="font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:#f5a623;letter-spacing:3px;text-transform:uppercase;animation:fadeInUp 1s ease 0.5s both;opacity:0;">Mecafilter</div>
  <div style="font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:#e8e8f0;margin:10px 0;line-height:1.2;animation:fadeInUp 1s ease 0.8s both;opacity:0;">
    Tablón de<br><span style="color:#f5a623;">Vacaciones</span>
  </div>
  <div style="font-size:0.82rem;color:#7070a0;animation:fadeInUp 1s ease 1.1s both;opacity:0;">Bienvenido a tu espacio de gestión de vacaciones</div>
  <div style="display:flex;gap:8px;justify-content:center;margin-top:28px;animation:fadeInUp 1s ease 1.4s both;opacity:0;">
    <div style="width:8px;height:8px;border-radius:50%;background:#f5a623;animation:dotPulse 1.5s ease-in-out infinite;"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#2e2e3e;animation:dotPulse 1.5s ease-in-out 0.3s infinite;"></div>

  </div>
</div>

<script>
  // Redirigir a la app tras la animación
  setTimeout(() => { location.replace('index.html'); }, 3500);
</script>

</body>
</html>
